<section class="custom-page">
    <h1>Design Your Own T-Shirt</h1>

    <form class="custom-form">

        <input type="text" placeholder="Your Name" required>

        <input type="email" placeholder="Your Email" required>

        <select required>
            <option>Select Size</option>
            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>
        </select>

        <select required>
            <option>Select Color</option>
            <option>Black</option>
            <option>White</option>
            <option>Red</option>
            <option>Blue</option>
        </select>

        <textarea placeholder="Describe Your Design" rows="5"></textarea>

        <button type="submit">Submit Design Request</button>

    </form>
</section>
